name: Deploy documentation in DocusaurOps

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: 'Name of the DocusaurOps app (alphanumeric, hyphens, underscores only)'
        required: true
        type: string
      app-path:
        description: 'URL path for the app (without leading or trailing slash, e.g., "my-app")'
        required: true
        type: string
      action:
        description: 'Action to perform: deploy or rollback'
        required: false
        type: choice
        options:
          - deploy
          - rollback
        default: 'deploy'

  push:
    paths:
      - 'documentation/**'
jobs:
    
    deploy:
        
        name: Deploy site in DocusaurOps
        uses: [[ENV_DOCUSAUROPS_HOST_REPO]]/.github/workflows/deploy-site.yml@main
        with:
            app-name: ${{ inputs.app-name || '[[ENV_SITE_TITLE]]' }}
            app-path: ${{ inputs.app-path || '[[ENV_BASE_URL]]' }}
            action: ${{ inputs.action || 'deploy' }}
            documentation-path:  ${{ 'documentation' || '[[ENV_DOC_PATH]]' }} 
        secrets: inherit